<!doctype html>
<html>
  <head>
    <div id="header"></div>

    <title>SipAndServe Home</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/home.css" />
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>

  <body>
      <div class="search-container">

          <input
              type="text"
              id="searchInput"
              placeholder="Search products..."
              autocomplete="off"
          >

          <div id="autocompleteList"></div>

      </div>

    <section class="hero">

        <div class="hero-content">

            <h1>Quality Consumables for Every Business</h1>

            <p>

                Browse our collection of paper cups, plastic cups, lids,
                straws, and other food service essentials.

            </p>

        </div>

    </section>

    <section class="products-section">

        <div class="section-title">

            <h2>Featured Products</h2>

            <p>Find the products that suit your business needs.</p>

        </div>

        <div class="grid" id="productGrid"></div>

    </section>

    <div class="grid" id="productGrid"></div>

    <div id="productModal" class="modal">
      <div class="modal-content">
        <span id="closeModal">&times;</span>
        <h2 id="modalTitle"></h2>
        <div id="modalImages" class="modal-images"></div>
      </div>
    </div>

    <div id="loginModal" class="modal">
      <div class="modal-content small-modal">
        <h3>Please login first</h3>
        <p>You need to log in to add items to cart.</p>

        <button id="goLoginBtn">Go to Login</button>
        <button id="closeLoginModal">Cancel</button>
      </div>
    </div>

    <script src="/js/home.js"></script>
    <script src="/js/header.js"></script>
  </body>
</html>
