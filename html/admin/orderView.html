<!DOCTYPE html>
<html lang="en">

<head>
    <div id="header"></div>

    <meta charset="UTF-8">
    <title>Admin Orders</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">
    <script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/itemView.css">

    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 520px;
            margin: 50px auto;
            border-radius: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .orderline-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .orderline-row select { width: 65%; }
        .orderline-row input { width: 25%; }
    </style>
</head>

<body>

<div id="header"></div>

<div class="container">

    <button id="openCreateModal">Create Order</button>

    <h2>Order Management</h2>

    <table id="orderTable" class="display">
        <thead>
        <tr>
            <th>ID</th>
            <th>Customer</th>
            <th>Placed</th>
            <th>Shipped</th>
            <th>Delivered</th>
            <th>Status</th>
            <th>Items</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- CREATE -->
<div class="modal" id="createModal">
    <div class="modal-content">

        <h3>Create Order</h3>

        <label>Customer</label>
        <select id="createCustomer"></select>

        <label>Date Placed</label>
        <input type="date" id="createDatePlaced">

        <hr>

        <div id="createOrderLines"></div>

        <button id="addCreateLine">Add Item</button>

        <hr>

        <button id="saveCreate">Create</button>
        <button id="closeCreate">Close</button>

    </div>
</div>

<!-- EDIT -->
<div class="modal" id="editModal">
    <div class="modal-content">

        <h3>Edit Order</h3>

        <input type="hidden" id="editOrderId">

        <label>Customer</label>
        <input type="text" id="editCustomerDisplay" readonly>

        <label>Date Placed</label>
        <input type="text" id="editDatePlacedDisplay" readonly>

        <label>Date Shipped</label>
        <input type="date" id="editDateShipped">

        <label>Date Delivered</label>
        <input type="date" id="editDateDelivered">

        <label>Status</label>
        <select id="editStatus">
            <option value="">Leave blank</option>
            <option value="Pending">Pending</option>
            <option value="Shipped">Shipped</option>
            <option value="Delivered">Delivered</option>
            <option value="Cancelled">Cancelled</option>
        </select>

        <hr>

        <div id="editOrderLines"></div>

        <button id="addEditLine">Add Item</button>

        <hr>

        <button id="saveEdit">Save</button>
        <button onclick="closeEditModal()">Close</button>

    </div>
</div>

<script src="/js/admin/orderView.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
