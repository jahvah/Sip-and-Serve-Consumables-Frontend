<!DOCTYPE html>
<html lang="en">

<head>

    <div id="header"></div>

    <meta charset="UTF-8">
    <title>Admin Orders</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Scroller -->
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">
    <script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/itemView.css">

    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        .modal-content {
            background: white;
            padding: 20px;
            width: 520px;
            margin: 50px auto;
            border-radius: 10px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .orderline-row {
            display: grid;
            grid-template-columns: 3fr 110px 100px 120px 90px;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        .orderline-row select,
        .orderline-row input { 
            width: 100%; 
            box-sizing: border-box;
        }

        /* IMPORTANT for infinite scroll UI */
        .dataTables_scrollBody {
            max-height: 500px !important;
        }

        .view-mode {
            margin: 10px 0;
        }
    </style>

</head>

<body>

<div id="header"></div>

<div class="container">

    <!-- VIEW MODE TOGGLE (FIXED - WAS MISSING LOGIC SUPPORT) -->
    <div class="view-mode">
        <label>View Mode:</label>
        <select id="viewMode">
            <option value="pagination">Pagination</option>
            <option value="scroll">Infinite Scroll</option>
        </select>
    </div>

    <button id="openCreateModal">Create Order</button>

    <h2>Order Management</h2>

    <!-- TABLE -->
    <table id="orderTable" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Placed</th>
                <th>Shipped</th>
                <th>Delivered</th>
                <th>Status</th>
                <th>Items</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- =========================
CREATE MODAL
========================= -->
<div class="modal" id="createModal">
    <div class="modal-content">

        <h3>Create Order</h3>

        <label>Customer</label>
        <select id="createCustomer"></select>

        <label>Date Placed</label>
        <input type="date" id="createDatePlaced">

        <hr>

        <div id="createOrderLines"></div>

        <button id="addCreateLine">Add Item</button>

        <hr>

        <button id="saveCreate">Create</button>
        <button id="closeCreate">Close</button>

    </div>
</div>

<!-- =========================
EDIT MODAL
========================= -->
<div class="modal" id="editModal">
    <div class="modal-content">

        <h3>Edit Order</h3>

        <input type="hidden" id="editOrderId">

        <label>Customer</label>
        <input type="text" id="editCustomerDisplay" readonly>

        <label>Date Placed</label>
        <input type="text" id="editDatePlacedDisplay" readonly>

        <label>Date Shipped</label>
        <input type="date" id="editDateShipped">

        <label>Date Delivered</label>
        <input type="date" id="editDateDelivered">

        <label>Status</label>
        <select id="editStatus">
            <option value="">Leave blank</option>
            <option value="Pending">Pending</option>
            <option value="Shipped">Shipped</option>
            <option value="Delivered">Delivered</option>
            <option value="Cancelled">Cancelled</option>
        </select>

        <hr>

        <div id="editOrderLines"></div>

        <button id="addEditLine">Add Item</button>

        <hr>

        <div class="grand-total">
            Grand Total:
            <strong id="orderGrandTotal">₱0.00</strong>
        </div>

        <hr>

        <button id="saveEdit">Save</button>
        <button onclick="closeEditModal()">Close</button>

    </div>
</div>

<!-- SCRIPTS -->
<script src="/js/admin/adminAuth.js"></script>
<script src="/js/admin/orderView.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
