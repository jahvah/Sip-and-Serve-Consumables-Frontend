<!DOCTYPE html>
<html lang="en">

<head>

    <div id="header"></div>

    <meta charset="UTF-8">
    <title>Admin Reviews</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/itemView.css">
    <link rel="stylesheet" href="/css/reviewView.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">

</head>


<body>


<div id="header"></div>


<div class="container">


    <h2>Review Management</h2>


    <!-- VIEW MODE -->
    <div class="view-mode">

        <label>
            View Mode:
        </label>

        <select id="viewMode">

            <option value="pagination">
                Pagination
            </option>

            <option value="scroll">
                Infinite Scroll
            </option>

        </select>

    </div>



    <!-- TABLE -->
    <table id="reviewTable" class="display">


        <thead>

            <tr>

                <th>ID</th>

                <th>Customer</th>

                <th>Item</th>

                <th>Item Image</th>

                <th>Rating</th>

                <th>Review</th>

                <th>Review Images</th>

                <th>Date</th>

            </tr>

        </thead>


        <tbody></tbody>


    </table>


</div>





<!-- VIEW REVIEW MODAL -->

<div class="modal" id="viewModal">


    <div class="modal-content">


        <h3>
            Review Details
        </h3>


        <hr>


        <label>
            Customer
        </label>

        <p id="viewCustomer"></p>



        <label>
            Item
        </label>

        <p id="viewItem"></p>



        <label>
            Rating
        </label>

        <div id="viewRating"></div>



        <hr>



        <label>
            Review
        </label>

        <p id="viewText"></p>



        <label>
            Images
        </label>


        <div id="viewImages" class="review-images"></div>



        <hr>


        <button onclick="closeReviewModal()">
            Close
        </button>


    </div>


</div>





<script src="/js/admin/adminAuth.js"></script>

<script src="/js/admin/reviewView.js"></script>

<script src="/js/header.js"></script>


</body>

</html>
