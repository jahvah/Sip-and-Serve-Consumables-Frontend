<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Admin Profile</title>

    <link rel="stylesheet" href="/css/header.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">

    <style>

        body{
            font-family:Arial,sans-serif;
            background:#f5f5f5;
        }

        .profile-container{

            width:520px;
            margin:40px auto;

            background:#fff;

            padding:25px;

            border-radius:10px;

            box-shadow:0 0 10px rgba(0,0,0,.1);

        }

        #profilePic{

            width:140px;
            height:140px;

            border-radius:50%;

            object-fit:cover;

            display:block;

            margin:auto;

            margin-bottom:20px;

            border:4px solid #ddd;

        }

        p{

            margin:12px 0;

        }

        button{

            padding:10px 20px;

            cursor:pointer;

            margin-top:15px;

        }

        .modal{

            display:none;

            position:fixed;

            left:0;
            top:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,.5);

            z-index:999;

        }

        .modal-content{

            width:450px;

            background:#fff;

            margin:60px auto;

            padding:20px;

            border-radius:10px;

        }

        .modal-content label{

            display:block;

            margin-top:12px;

            font-weight:bold;

        }

        .modal-content input{

            width:100%;

            padding:10px;

            margin-top:5px;

            box-sizing:border-box;

        }

    </style>

</head>

<body>

<div id="header"></div>

<div class="profile-container">

    <img
        id="profilePic"
        src="/uploads/profile/default.png"
    >

    <p>

        <strong>Email:</strong>

        <span id="email"></span>

    </p>

    <p>

        <strong>Role:</strong>

        <span id="role"></span>

    </p>

    <p>

        <strong>Status:</strong>

        <span id="status"></span>

    </p>

    <button id="editBtn">

        Update Profile

    </button>

</div>

<div
    class="modal"
    id="editModal">

    <div class="modal-content">

        <h2>

            Update Profile

        </h2>

        <label>

            Email

        </label>

        <input
            id="emailInput"
            type="email">

        <label>

            New Password

        </label>

        <input
            id="password"
            type="password">

        <label>

            Confirm Password

        </label>

        <input
            id="confirmPassword"
            type="password">

        <img
            id="previewImage"
            src="/uploads/profile/default.png"
            style="
                width:120px;
                height:120px;
                border-radius:50%;
                object-fit:cover;
                display:block;
                margin:15px auto;
                border:3px solid #ddd;
            ">

        <label>

            Profile Picture

        </label>

        <input
            id="profileImage"
            type="file"
            accept="image/*">

        <button id="saveBtn">

            Save

        </button>

        <button id="closeBtn">

            Close

        </button>

    </div>

</div>

<script src="/js/header.js"></script>
<script src="/js/admin/adminProfile.js"></script>

</body>
</html>
