<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Inventory Management</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Select2 -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/itemView.css">

</head>

<body>

    <div id="header"></div>

    <div class="container mt-4">

        <!-- =========================
             HERO
        ========================== -->

        <section class="page-hero">

            <div>

                <h1>

                    Inventory Management

                </h1>

                <p>

                    Manage products, inventory, pricing, images and categories.

                </p>

            </div>

            <button
                id="openCreateModal"
                class="btn btn-success hero-btn">

                <i class="fa-solid fa-plus"></i>

                Create Item

            </button>

        </section>

        <!-- =========================
             TOOLBAR
        ========================== -->

        <div class="toolbar">

            <div>

                <label>

                    Display Mode

                </label>

                <select id="viewMode">

                    <option value="pagination">

                        Pagination

                    </option>

                    <option value="scroll">

                        Infinite Scroll

                    </option>

                </select>

            </div>

        </div>

        <!-- =========================
             TABLE
        ========================== -->

        <div class="table-card">

            <table id="itemTable" class="display" style="width:100%">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Description</th>

                        <th>Cost</th>

                        <th>Sell</th>

                        <th>Stock</th>

                        <th>Category</th>

                        <th>Main Image</th>

                        <th>Gallery</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <!-- =========================
         EDIT MODAL
    ========================== -->

    <div class="modal" id="editModal">

        <div class="modal-content">

            <h3>Edit Item</h3>

            <input type="hidden" id="editId">

            <label>Item Name</label>
            <input type="text" id="editName">

            <label>Description</label>
            <input type="text" id="editDescription">

            <label>Cost Price</label>
            <input type="text" id="editCost">

            <label>Selling Price</label>
            <input type="text" id="editSell">

            <label>Stock</label>
            <input type="number" id="editStock">

            <label>Category</label>

            <select id="editCategory"></select>

            <hr>

            <h4>Main Image</h4>

            <img
                id="previewMainImage"
                width="120"
                style="display:block;margin-bottom:10px;">

            <input
                type="file"
                id="editMainImage"
                accept="image/*">

            <button id="btnUpdateMainImage">

                Update Main Image

            </button>

            <button id="btnDeleteMainImage">

                Delete Main Image

            </button>

            <hr>

            <h4>Gallery Images</h4>

            <div id="editGallery"></div>

            <label>Add Images</label>

            <input
                type="file"
                id="editImages"
                multiple
                accept="image/*">

            <button id="btnAddImages">

                Add Images

            </button>

            <hr>

            <button id="saveEdit">

                Save Changes

            </button>

            <button onclick="closeModal()">

                Cancel

            </button>

        </div>

    </div>

    <!-- =========================
         CREATE MODAL
    ========================== -->

    <div class="modal" id="createModal">

        <div class="modal-content">

            <h3>Create Item</h3>

            <label>Item Name</label>
            <input type="text" id="createName">

            <label>Description</label>
            <input type="text" id="createDescription">

            <label>Cost Price</label>
            <input type="number" id="createCost">

            <label>Selling Price</label>
            <input type="number" id="createSell">

            <label>Stock</label>
            <input type="number" id="createStock">

            <label>Category</label>

            <select id="createCategory"></select>

            <label>Main Image</label>

            <input
                type="file"
                id="createMainImage"
                accept="image/*">

            <label>Gallery Images</label>

            <input
                type="file"
                id="createImages"
                multiple
                accept="image/*">

            <hr>

            <button id="saveCreate">

                Create Item

            </button>

            <button id="closeCreate">

                Cancel

            </button>

        </div>

    </div>

    <!-- Scripts -->

    <script src="/js/admin/adminAuth.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/admin/itemView.js"></script>

</body>

</html>
