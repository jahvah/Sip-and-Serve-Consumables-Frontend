<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Items</title>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<!-- Scroller -->
<link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">
<script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/itemView.css">

<style>
/* basic modal styling (you can move to css file) */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: white;
    padding: 20px;
    width: 400px;
    margin: 10% auto;
    border-radius: 10px;
}

.modal-content input,
.modal-content select {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- VIEW MODE -->
<div class="view-mode">
    <label>View Mode:</label>
    <select id="viewMode">
        <option value="pagination">Pagination</option>
        <option value="scroll">Scroll</option>
    </select>
</div>

<!-- TABLE -->
<div class="container">

    <h2>Item Management</h2>

    <table id="itemTable" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Cost</th>
                <th>Sell</th>
                <th>Category</th>
                <th>Image</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">

    <div class="modal-content">

        <h3>Edit Item</h3>

        <input type="hidden" id="editId">

        <label>Item Name</label>
        <input type="text" id="editName" placeholder="Leave blank to keep">

        <label>Description</label>
        <input type="text" id="editDescription" placeholder="Leave blank to keep">

        <label>Cost Price</label>
        <input type="text" id="editCost" placeholder="Leave blank to keep">

        <label>Sell Price</label>
        <input type="text" id="editSell" placeholder="Leave blank to keep">

        <label>Category</label>
        <select id="editCategory"></select>

        <button id="saveEdit">Save</button>
        <button onclick="closeModal()">Close</button>

    </div>

</div>

<!-- SCRIPT -->
<script src="/js/admin/itemView.js"></script>

<script>
$("#header").load("/html/admin/header.html", function () {
    $.getScript("/js/header.js");
});
</script>

</body>
</html>
