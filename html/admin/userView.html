<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Admin Users</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">
<script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>

<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/userView.css">
</head>

<body>

<div id="header"></div>

<div class="view-mode">

    <label>View Mode:</label>

    <select id="viewMode">
        <option value="pagination">Pagination</option>
        <option value="scroll">Scroll</option>
    </select>

</div>
<div class="container">

    <button id="openCreateModal">New Customer</button>

    <h2>Users Management</h2>

    <table id="usersTable" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>Email</th>
                <th>Role</th>
                <th>Status</th>

                <th>First Name</th>
                <th>Last Name</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Town</th>

                <th>Image</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody></tbody>
    </table>

</div>

<div class="modal" id="createModal">

    <div class="modal-content">

        <h3>Create Customer</h3>

        <label>Email</label>
        <input type="email" id="createEmail">

        <label>Password</label>
        <input type="password" id="createPassword">

        <label>Role</label>
        <select id="createRole">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
        </select>

        <label>Status</label>
        <select id="createStatus">
            <option value="Active">Active</option>
            <option value="Deactivated">Deactivated</option>
        </select>

        <hr>

        <label>First Name</label>
        <input type="text" id="createFname">

        <label>Last Name</label>
        <input type="text" id="createLname">

        <label>Phone</label>
        <input type="text" id="createPhone">

        <label>Address</label>
        <input type="text" id="createAddress">

        <label>Town</label>
        <input type="text" id="createTown">

        <label>Profile Image</label>
        <input type="file" id="createImage">

        <button id="saveCreate">Create Customer</button>
        <button id="closeCreate">Close</button>

    </div>

</div>

<!-- ================= EDIT MODAL ================= -->
<div class="modal" id="editModal">

    <div class="modal-content">

        <h3>Edit User</h3>

        <input type="hidden" id="editId">

        <label>Email</label>
        <input type="text" id="editEmail" readonly>

        <label>Role</label>
        <select id="editRole">
            <option value="User">User</option>
            <option value="Admin">Admin</option>
        </select>

        <label>Status</label>
        <select id="editStatus">
            <option value="Active">Active</option>
            <option value="Deactivated">Deactivated</option>
        </select>

        <hr>

        <label>First Name</label>
        <input type="text" id="editFname" placeholder="First Name">

        <label>Last Name</label>
        <input type="text" id="editLname" placeholder="Last Name">

        <label>Phone</label>
        <input type="text" id="editPhone" placeholder="Phone">

        <label>Address</label>
        <input type="text" id="editAddress" placeholder="Address">

        <label>Town</label>
        <input type="text" id="editTown" placeholder="Town">
        
        <label>Profile Image</label>
        <input type="file" id="editImage">

        <button id="saveEdit">Save</button>
        <button onclick="closeModal()">Close</button>

    </div>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="/js/admin/userView.js"></script>

<script>
    $("#header").load("/html/admin/header.html", function () {
        $.getScript("/js/header.js");
    });
</script>

</body>
</html>
