<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>User Management</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- DataTables -->
    <link rel="stylesheet"
        href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">

    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

    <link rel="stylesheet"
        href="https://cdn.datatables.net/scroller/2.4.3/css/scroller.dataTables.min.css">

    <script src="https://cdn.datatables.net/scroller/2.4.3/js/dataTables.scroller.min.js"></script>

    <!-- Fonts -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->

    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/userView.css">

</head>

<body>

    <div id="header"></div>

    <div class="container">

        <!-- HERO -->

        <section class="page-hero">

            <div>

                <h1>

                    User Management

                </h1>

                <p>

                    Manage customers, administrators, account roles and user information.

                </p>

            </div>

            <button
                id="openCreateModal"
                class="btn btn-success hero-btn">

                <i class="fa-solid fa-user-plus"></i>

                New User

            </button>

        </section>

        <!-- TABLE CARD -->

        <div class="table-card">

            <div class="table-header">

                <div>

                    <h2>

                        <i class="fa-solid fa-users"></i>

                        Users

                    </h2>

                    <p>

                        View and manage all registered users.

                    </p>

                </div>

                <div class="view-mode">

                    <label>

                        View Mode

                    </label>

                    <select id="viewMode">

                        <option value="pagination">

                            Pagination

                        </option>

                        <option value="scroll">

                            Infinite Scroll

                        </option>

                    </select>

                </div>

            </div>

            <table id="usersTable" class="display">

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Email</th>

                        <th>Role</th>

                        <th>Status</th>

                        <th>First Name</th>

                        <th>Last Name</th>

                        <th>Phone</th>

                        <th>Address</th>

                        <th>Town</th>

                        <th>Image</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody></tbody>

            </table>

        </div>

    </div>

    <!-- =======================================================
         CREATE USER MODAL
    ======================================================== -->

    <div class="modal" id="createModal">

        <div class="modal-content large-modal">

            <div class="modal-header">

                <h3>

                    <i class="fa-solid fa-user-plus"></i>

                    Create User

                </h3>

            </div>

            <div class="modal-body">

                <div class="form-grid">

                    <div>

                        <label>Email</label>

                        <input
                            type="email"
                            id="createEmail">

                    </div>

                    <div>

                        <label>Password</label>

                        <input
                            type="password"
                            id="createPassword">

                    </div>

                    <div>

                        <label>Role</label>

                        <select id="createRole">

                            <option value="User">

                                User

                            </option>

                            <option value="Admin">

                                Admin

                            </option>

                        </select>

                    </div>

                    <div>

                        <label>Status</label>

                        <select id="createStatus">

                            <option value="Active">

                                Active

                            </option>

                            <option value="Deactivated">

                                Deactivated

                            </option>

                        </select>

                    </div>

                </div>

                <hr>

                <div class="form-grid">

                    <div>

                        <label>First Name</label>

                        <input
                            type="text"
                            id="createFname">

                    </div>

                    <div>

                        <label>Last Name</label>

                        <input
                            type="text"
                            id="createLname">

                    </div>

                    <div>

                        <label>Phone</label>

                        <input
                            type="text"
                            id="createPhone">

                    </div>

                    <div>

                        <label>Town</label>

                        <input
                            type="text"
                            id="createTown">

                    </div>

                    <div class="full-width">

                        <label>Address</label>

                        <input
                            type="text"
                            id="createAddress">

                    </div>

                    <div class="full-width">

                        <label>Profile Image</label>

                        <input
                            type="file"
                            id="createImage">

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    id="saveCreate"
                    class="btn btn-success">

                    <i class="fa-solid fa-check"></i>

                    Create User

                </button>

                <button
                    id="closeCreate"
                    class="btn btn-secondary">

                    Close

                </button>

            </div>

        </div>

    </div>
        <!-- =======================================================
         EDIT USER MODAL
    ======================================================== -->

    <div class="modal" id="editModal">

        <div class="modal-content large-modal">

            <div class="modal-header">

                <h3>

                    <i class="fa-solid fa-user-pen"></i>

                    Edit User

                </h3>

            </div>

            <div class="modal-body">

                <input
                    type="hidden"
                    id="editId">

                <div class="form-grid">

                    <div>

                        <label>Email</label>

                        <input
                            type="text"
                            id="editEmail"
                            readonly>

                    </div>

                    <div>

                        <label>Role</label>

                        <select id="editRole">

                            <option value="User">

                                User

                            </option>

                            <option value="Admin">

                                Admin

                            </option>

                        </select>

                    </div>

                    <div>

                        <label>Status</label>

                        <select id="editStatus">

                            <option value="Active">

                                Active

                            </option>

                            <option value="Deactivated">

                                Deactivated

                            </option>

                        </select>

                    </div>

                </div>

                <hr>

                <div class="form-grid">

                    <div>

                        <label>First Name</label>

                        <input
                            type="text"
                            id="editFname"
                            placeholder="First Name">

                    </div>

                    <div>

                        <label>Last Name</label>

                        <input
                            type="text"
                            id="editLname"
                            placeholder="Last Name">

                    </div>

                    <div>

                        <label>Phone</label>

                        <input
                            type="text"
                            id="editPhone"
                            placeholder="Phone">

                    </div>

                    <div>

                        <label>Town</label>

                        <input
                            type="text"
                            id="editTown"
                            placeholder="Town">

                    </div>

                    <div class="full-width">

                        <label>Address</label>

                        <input
                            type="text"
                            id="editAddress"
                            placeholder="Address">

                    </div>

                    <div class="full-width">

                        <label>Profile Image</label>

                        <input
                            type="file"
                            id="editImage">

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    id="saveEdit"
                    class="btn btn-success">

                    <i class="fa-solid fa-floppy-disk"></i>

                    Save Changes

                </button>

                <button
                    onclick="closeModal()"
                    class="btn btn-secondary">

                    Close

                </button>

            </div>

        </div>

    </div>

    <!-- ===========================
         SCRIPTS
    ============================ -->

    <script src="/js/admin/adminAuth.js"></script>
    <script src="/js/header.js"></script>
    <script src="/js/admin/userView.js"></script>

</body>

</html>
