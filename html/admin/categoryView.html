<!DOCTYPE html>
<html lang="en">

<head>
<div id="header"></div>

<meta charset="UTF-8">
<title>Admin Categories</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/categoryView.css">

</head>

<body>

<div id="header"></div>

<div class="container mt-4">

    <!-- HERO -->
    <section class="page-hero">

        <div>

            <h1>
                Category Management
            </h1>

            <p>
                Organize products by creating and managing categories.
            </p>

        </div>

        <button
            id="openCreateModal"
            class="btn btn-success hero-btn">

            <i class="fa-solid fa-plus"></i>

            Create Category

        </button>

    </section>

    <!-- TABLE CARD -->

    <div class="table-card">

        <div class="table-toolbar">

            <div>

                <h2>

                    Categories

                </h2>

                <small>

                    Manage all available product categories.

                </small>

            </div>

            <div class="view-mode">

                <label>

                    View Mode

                </label>

                <select id="viewMode">

                    <option value="pagination">

                        Pagination

                    </option>

                    <option value="scroll">

                        Infinite Scroll

                    </option>

                </select>

            </div>

        </div>

        <table
            id="categoryTable"
            class="display"
            style="width:100%">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Category</th>

                    <th width="180">

                        Actions

                    </th>

                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </div>

</div>

<!-- =========================
EDIT MODAL
========================= -->

<div class="modal" id="editModal">

    <div class="modal-content">

        <h3>

            <i class="fa-solid fa-pen"></i>

            Edit Category

        </h3>

        <input
            type="hidden"
            id="editId">

        <label>

            Category Name

        </label>

        <input
            type="text"
            id="editCategory">

        <div class="modal-actions">

            <button
                id="saveEdit"
                class="btn btn-success">

                Save Changes

            </button>

            <button
                onclick="closeModal()"
                class="btn btn-secondary">

                Close

            </button>

        </div>

    </div>

</div>

<!-- =========================
CREATE MODAL
========================= -->

<div class="modal" id="createModal">

    <div class="modal-content">

        <h3>

            <i class="fa-solid fa-folder-plus"></i>

            Create Category

        </h3>

        <label>

            Category Name

        </label>

        <input
            type="text"
            id="createCategory">

        <div class="modal-actions">

            <button
                id="saveCreate"
                class="btn btn-success">

                Create Category

            </button>

            <button
                id="closeCreate"
                class="btn btn-secondary">

                Close

            </button>

        </div>

    </div>

</div>

<script src="/js/admin/adminAuth.js"></script>
<script src="/js/admin/categoryView.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
