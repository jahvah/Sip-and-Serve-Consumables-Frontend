<!DOCTYPE html>
<html lang="en">

<head>
<div id="header"></div>

<meta charset="UTF-8">
<title>Admin Categories</title>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/header.css">
<link rel="stylesheet" href="/css/theme.css">
<link rel="stylesheet" href="/css/components.css">
<link rel="stylesheet" href="/css/categoryView.css">

<style>

.dataTables_scrollBody {
    max-height:500px !important;
}

.view-mode {
    margin:10px 0;
}

</style>

</head>

<body>

<div id="header"></div>

<div class="view-mode">
    <label>View Mode:</label>
    <select id="viewMode">
        <option value="pagination">Pagination</option>
        <option value="scroll">Scroll</option>
    </select>
</div>

<div class="container">

    <button id="openCreateModal">Create Category</button>

    <h2>Category Management</h2>

    <table id="categoryTable" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>Category</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<!-- EDIT MODAL -->
<div class="modal" id="editModal">
    <div class="modal-content">

        <h3>Edit Category</h3>

        <input type="hidden" id="editId">

        <label>Category</label>
        <input type="text" id="editCategory">

        <button id="saveEdit">Save</button>
        <button onclick="closeModal()">Close</button>

    </div>
</div>

<!-- CREATE MODAL -->
<div class="modal" id="createModal">

    <div class="modal-content">

        <h3>Create Category</h3>

        <label>Category</label>
        <input type="text" id="createCategory">

        <button id="saveCreate">Create</button>
        <button id="closeCreate">Close</button>

    </div>

</div>

<script src="/js/admin/adminAuth.js"></script>
<script src="/js/admin/categoryView.js"></script>
<script src="/js/header.js"></script>
</body>
</html>
