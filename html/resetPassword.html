<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Reset Password</title>

    <link rel="stylesheet" href="/css/header.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>

        body{

            font-family:Arial,sans-serif;
            background:#f5f5f5;

        }

        .container{

            width:400px;

            margin:80px auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 5px 15px rgba(0,0,0,.15);

        }

        h2{

            text-align:center;

            margin-bottom:20px;

        }

        input{

            width:100%;

            padding:10px;

            margin-bottom:15px;

            box-sizing:border-box;

        }

        button{

            width:100%;

            padding:10px;

            background:#6F4E37;

            color:white;

            border:none;

            border-radius:5px;

            cursor:pointer;

        }

        button:hover{

            opacity:.9;

        }

        #msg{

            margin-top:15px;

            text-align:center;

        }

    </style>

</head>

<body>

<div id="header"></div>

<div class="container">

    <h2>Reset Password</h2>

    <input
        type="password"
        id="password"
        placeholder="New Password">

    <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm Password">

    <button id="resetBtn">

        Reset Password

    </button>

    <p id="msg"></p>

</div>

<script>

$("#header").load("/html/header.html",function(){

    $.getScript("/js/header.js");

});

</script>

<script src="/js/resetPassword.js"></script>

</body>

</html>
