<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>
        Verification Link Expired
    </title>



    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">


    <link rel="stylesheet" href="/css/header.css">

    <link rel="stylesheet" href="/css/theme.css">

    <link rel="stylesheet" href="/css/components.css">

    <link rel="stylesheet" href="/css/auth.css">


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>


</head>


<body>


<div id="header"></div>




<section class="auth-page">


<div class="auth-card">


<div class="auth-header">


<i class="fa-solid fa-clock auth-icon-warning"></i>


<h2>
Verification Link Expired
</h2>


</div>





<p class="auth-description">


Your email verification link has expired.


<br><br>


For security reasons, verification links are only valid for

<strong>
24 hours
</strong>.


<br><br>


Please return to the login page and request a new verification email.


</p>





<a

href="/html/login.html"

class="auth-link-btn"

>


<i class="fa-solid fa-right-to-bracket"></i>


Go to Login


</a>



</div>


</section>






<script>


$("#header").load("/html/header.html", function(){


    $.getScript("/js/header.js");


});


</script>


</body>


</html>
