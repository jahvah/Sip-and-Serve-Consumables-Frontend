<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Update Profile</title>

    <link rel="stylesheet" href="/css/header.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        .profile-container {
            width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
        }

        #profilePic {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: auto;
            margin-bottom: 20px;
        }

        p {
            margin: 10px 0;
        }

        button {
            padding: 10px 18px;
            cursor: pointer;
            margin-top: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
        }

        .modal-content {
            background: white;
            width: 450px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
        }

        .input-box {
            position: relative;
            margin-bottom: 15px;
        }

        .input-box input,
        .input-box select {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            background: transparent;
            position: relative;
            z-index: 2;
        }

        .bg-text {
            position: absolute;
            left: 12px;
            top: 11px;
            color: #999;
            pointer-events: none;
            z-index: 1;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
    </style>

</head>

<body>

    <div id="header"></div>

    <div class="profile-container">

        <img id="profilePic" src="" alt="Profile">

        <p>
            <strong>Email:</strong>
            <span id="email"></span>
        </p>

        <p>
            <strong>Role:</strong>
            <span id="role"></span>
        </p>

        <p>
            <strong>Status:</strong>
            <span id="status"></span>
        </p>

        <p>
            <strong>Name:</strong>
            <span id="fullName"></span>
        </p>

        <p>
            <strong>Address:</strong>
            <span id="displayAddress"></span>
        </p>

        <p>
            <strong>Town:</strong>
            <span id="displayTown"></span>
        </p>

        <p>
            <strong>Phone:</strong>
            <span id="displayPhone"></span>
        </p>

        <button id="editBtn">
            Update Profile
        </button>

    </div>

    <div class="modal" id="editModal">

        <div class="modal-content">

            <h2>Update Profile</h2>

            <label>Profile Image</label>
            <input
                type="file"
                id="profileImage"
                accept="image/*">

            <br><br>

            <label>Title</label>

            <div class="input-box">
                <select id="title">
                    <option value="">Select</option>
                    <option value="Mr.">Mr.</option>
                    <option value="Mrs.">Mrs.</option>
                    <option value="Ms.">Ms.</option>
                </select>
            </div>

            <label>First Name</label>

            <div class="input-box">
                <input
                    type="text"
                    id="fname"
                    class="ghost-input"
                    data-bg="bg-fname">

                <span class="bg-text" id="bg-fname"></span>
            </div>

            <label>Last Name</label>

            <div class="input-box">
                <input
                    type="text"
                    id="lname"
                    class="ghost-input"
                    data-bg="bg-lname">

                <span class="bg-text" id="bg-lname"></span>
            </div>

            <label>Address</label>

            <div class="input-box">
                <input
                    type="text"
                    id="addressline"
                    class="ghost-input"
                    data-bg="bg-addressline">

                <span class="bg-text" id="bg-addressline"></span>
            </div>

            <label>Town</label>

            <div class="input-box">
                <input
                    type="text"
                    id="town"
                    class="ghost-input"
                    data-bg="bg-town">

                <span class="bg-text" id="bg-town"></span>
            </div>

            <label>Phone</label>

            <div class="input-box">
                <input
                    type="tel"
                    id="phone"
                    class="ghost-input"
                    data-bg="bg-phone">

                <span class="bg-text" id="bg-phone"></span>
            </div>

            <button id="saveBtn">Save</button>
            <button id="closeBtn">Close</button>

        </div>

    </div>

    <script src="/js/customer/updateProfile.js"></script>
    <script src="/js/header.js"></script>

</body>

</html>
