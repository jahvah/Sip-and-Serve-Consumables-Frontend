<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Review Site</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/reviewSite.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="page-container">
    <div id="header"></div>

    <div class="container">

    <div class="page-header">

        <div>

            <h1>

                My Reviews

            </h1>

            <p>

                Manage your reviews and share your shopping experience.

            </p>

        </div>

    </div>

    <input type="hidden" id="customer_id">

    <!-- =========================
         ORDERS TO REVIEW
    ========================== -->
    <section class="review-section">

        <div class="section-header modern-header">

            <h2>

                Pending Reviews

            </h2>

            <span
                class="section-count"
                id="pendingCount">

                0

            </span>

        </div>

        <div id="pendingContainer"></div>

    </section>

    <section class="review-section">

        <div class="section-header">

            <h2>

                Review History

            </h2>

            <span
                class="section-count"
                id="reviewCount">

                0

            </span>

        </div>

        <div id="reviewContainer"></div>

    </section>

</div>

<!-- =========================
     CREATE REVIEW MODAL
========================= -->
<div class="modal fade" id="createModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5>

                <i class="fa-solid fa-star"></i>

                Write a Review

                </h5>
            </div>

            <div class="modal-body">

                <input type="hidden" id="c_orderinfo_id">
                <input type="hidden" id="c_item_id">

                <div id="starContainer">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>

                <textarea id="c_review_text" class="form-control mt-2" placeholder="Write review..."></textarea>

                <input type="file" id="c_images" multiple class="form-control mt-2">

                <div id="c_preview" class="mt-2"></div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" id="btnSaveReview">Submit</button>
            </div>

        </div>
    </div>
</div>

<!-- =========================
     EDIT REVIEW MODAL
========================= -->
<div class="modal fade" id="editModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5>

                <i class="fa-solid fa-pen"></i>

                Edit Review

                </h5>
            </div>

            <div class="modal-body">

                <input type="hidden" id="e_review_id">

                <div id="e_starContainer">
                    <span class="star" data-value="1">★</span>
                    <span class="star" data-value="2">★</span>
                    <span class="star" data-value="3">★</span>
                    <span class="star" data-value="4">★</span>
                    <span class="star" data-value="5">★</span>
                </div>

                <textarea id="e_review_text" class="form-control mt-2"></textarea>

                <input type="file" id="e_images" multiple class="form-control mt-2">

                <div id="e_existing_images" class="mt-2"></div>
                <div id="e_preview" class="mt-2"></div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-success" id="btnUpdateReview">Update</button>
            </div>

        </div>
    </div>
</div>

<!-- =========================
     VIEW REVIEW MODAL
========================= -->
<div class="modal fade" id="viewModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5>

                <i class="fa-solid fa-eye"></i>

                Review Details

                </h5>
            </div>

            <div class="modal-body">

                <div id="view_content"></div>

            </div>

        </div>
    </div>
</div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="/js/customer/reviewSite.js"></script>
<script src="/js/header.js"></script>

</body>
</html>
